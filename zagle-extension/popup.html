<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 240px;
        font-family: -apple-system, sans-serif;
        font-size: 13px;
        padding: 14px;
        color: #1c1e1f;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        margin-bottom: 8px;
        border: 1px solid #c7c2b6;
        border-radius: 6px;
      }
      button {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #d9560f;
        color: #fff;
        font-weight: 500;
        cursor: pointer;
      }
      .signed-in p {
        margin: 0 0 10px;
      }
      .error {
        color: #b8342a;
        margin: 6px 0;
      }
      .hint {
        color: #6a6d68;
        margin-top: 10px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
